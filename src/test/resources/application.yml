spring:
  application:
    name: portfolio-manager-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-for-jwt-token-generation-must-be-256-bits-long
  expiration: 1200000

external:
  member-api:
    base-url: http://localhost:8080/api/external/members
